<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}QRZ Vibe{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #01030d;
            --bg-dark: #040a1f;
            --bg-mid: #0a1440;

            --qrz-orange: #ff5a00;
            --vibe-yellow: #ffe95a;

            /* 🔥 HEART COLOR (PRIMARY ACTION COLOR) */
            --heart-main: #ff2e63;
            --heart-light: #ff5a85;
            --heart-dark: #c81e4a;

            --text-main: #ffffff;
            --text-soft: rgba(255,255,255,0.85);
            --text-muted: rgba(255,255,255,0.56);
        }

        * {
            box-sizing: border-box;
            font-family: "Inter", system-ui, sans-serif;
        }

        body {
            margin: 0;
            color: var(--text-main);

            background:
                radial-gradient(circle at 12% 20%, rgba(255, 46, 99, 0.20), transparent 26%),
                radial-gradient(circle at 88% 14%, rgba(255, 233, 90, 0.18), transparent 26%),
                linear-gradient(135deg, #01030d 0%, #040a1f 40%, #0a1440 100%);
        }

        .qrz-header {
            text-align: center;
            padding: 50px 20px 10px;
        }

        .qrz-logo {
            width: clamp(320px, 28vw, 520px);
            margin: 0 auto 18px;
            display: block;
        }

        .qrz-title {
            display: flex;
            justify-content: center;
            gap: 14px;

            font-size: clamp(3rem, 5vw, 5rem);
            font-weight: 900;
            letter-spacing: -0.04em;
        }

        .qrz-word {
            color: var(--qrz-orange);

            -webkit-text-stroke: 2.8px rgba(0,0,0,0.95);

            text-shadow:
                0 3px 0 rgba(255,255,255,1),
                0 1px 0 rgba(0,0,0,1),
                0 2px 0 rgba(0,0,0,0.95),
                0 5px 8px rgba(0,0,0,0.7),
                0 10px 18px rgba(0,0,0,0.6);
        }

        .vibe-word {
            color: var(--vibe-yellow);

            -webkit-text-stroke: 1.4px rgba(0,0,0,0.75);

            text-shadow:
                0 3px 0 rgba(255,255,255,0.95),
                0 1px 0 rgba(0,0,0,0.8),
                0 2px 0 rgba(0,0,0,0.7),
                0 4px 6px rgba(0,0,0,0.4),
                0 8px 14px rgba(0,0,0,0.3);
        }

        .qrz-subtitle {
            margin-top: 10px;
            color: var(--text-soft);
            font-size: 1rem;
        }

        /* =========================
           🔥 HEART 3D BUTTON SYSTEM
        ========================== */
        .qrz-nav {
            margin-top: 26px;
            display: flex;
            justify-content: center;
            gap: 18px;
        }

        .qrz-nav a {
            text-decoration: none;
            padding: 14px 26px;
            border-radius: 14px;

            /* 🔥 BRIGHT TEXT */
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 0.6px;

            text-shadow:
                0 1px 0 rgba(0,0,0,0.9),
                0 2px 6px rgba(0,0,0,0.6);

            /* 🔥 HEART GRADIENT */
            background: linear-gradient(145deg, var(--heart-light), var(--heart-main));

            /* 🔥 3D DEPTH */
            box-shadow:
                0 5px 0 var(--heart-dark),
                0 12px 25px rgba(255, 46, 99, 0.35),
                0 0 12px rgba(255, 46, 99, 0.35);

            transition: all 0.15s ease;
        }

        /* 🔥 HOVER = LIFT + GLOW */
        .qrz-nav a:hover {
            transform: translateY(-4px);

            box-shadow:
                0 7px 0 var(--heart-dark),
                0 18px 35px rgba(255, 46, 99, 0.45),
                0 0 18px rgba(255, 46, 99, 0.6);

            text-shadow:
                0 1px 0 rgba(0,0,0,1),
                0 2px 8px rgba(0,0,0,0.7),
                0 0 8px rgba(255,255,255,0.4);
        }

        /* 🔥 CLICK PRESS */
        .qrz-nav a:active {
            transform: translateY(3px);

            box-shadow:
                0 2px 0 var(--heart-dark),
                0 6px 12px rgba(255, 46, 99, 0.4);
        }

        .qrz-container {
            width: min(1400px, calc(100% - 30px));
            margin: 20px auto;
        }

        .qrz-footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

<header class="qrz-header">
    <img src="/static/images/logo.png" class="qrz-logo">

    <div class="qrz-title">
        <span class="qrz-word">QRZ</span>
        <span class="vibe-word">Vibe</span>
    </div>

    <div class="qrz-subtitle">
        Premium connections. Brighter chemistry.
    </div>

    <nav class="qrz-nav">
        <a href="/dashboard">Dashboard</a>
        <a href="/matches">Matches</a>
        <a href="/chat">Chat</a>
        <a href="/profile">Profile</a>
    </nav>
</header>

<main class="qrz-container">
    {% block content %}{% endblock %}
</main>

<footer class="qrz-footer">
    QRZ Vibe © 2026
</footer>

</body>
</html>
